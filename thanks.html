<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're registered — Magion AI</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0f1e35;
      --gold: #C9A84C;
      --cream: #F5F0E8;
      --body-font: 'DM Sans', sans-serif;
      --display-font: 'DM Serif Display', serif;
      --mono-font: 'DM Mono', monospace;
    }
    body {
      font-family: var(--body-font);
      background: var(--navy);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    nav {
      padding: 0 40px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(201,168,76,0.12);
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: white;
      font-family: var(--mono-font);
      font-size: 0.85rem;
      letter-spacing: 0.08em;
    }
    .logo-m {
      width: 30px;
      height: 30px;
      background: var(--gold);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--navy);
      font-family: var(--mono-font);
    }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      text-align: center;
    }
    .tick {
      width: 72px;
      height: 72px;
      background: rgba(201,168,76,0.12);
      border: 2px solid rgba(201,168,76,0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
      font-size: 1.8rem;
    }
    h1 {
      font-family: var(--display-font);
      font-size: clamp(2rem, 5vw, 3.5rem);
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }
    h1 em { color: var(--gold); font-style: italic; }
    p {
      font-size: 1rem;
      color: rgba(255,255,255,0.55);
      font-weight: 300;
      line-height: 1.7;
      max-width: 440px;
      margin: 0 auto 40px;
    }
    .btn {
      display: inline-block;
      background: var(--gold);
      color: var(--navy);
      font-weight: 600;
      font-size: 0.9rem;
      padding: 14px 32px;
      border-radius: 6px;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    footer {
      padding: 24px 40px;
      text-align: center;
      font-family: var(--mono-font);
      font-size: 0.72rem;
      color: rgba(255,255,255,0.2);
      border-top: 1px solid rgba(255,255,255,0.06);
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">
      <div class="logo-m">M</div>
      MAGION.AI
    </a>
  </nav>
  <main>
    <div>
      <div class="tick">✓</div>
      <h1>You're <em>registered.</em></h1>
      <p>We'll send your Google Meet link before the session. See you on Monday 11 May at 3pm UK.</p>
      <a href="index.html" class="btn">← Back to event page</a>
    </div>
  </main>
  <footer>© 2026 Magion AI. All rights reserved.</footer>
</body>
</html>
