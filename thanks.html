<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're registered — Magion AI Roundtable</title>
  <meta name="description" content="You're registered for the Magion AI Roundtable on 11 May 2026.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%231B2A4A'/><text x='50' y='68' font-size='55' text-anchor='middle' fill='%23C9A84C' font-family='Inter,sans-serif' font-weight='900'>M</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }

    :root {
      --navy:   #1B2A4A;
      --cream:  #F5F0E8;
      --gold:   #C9A84C;
      --gold-h: #dbbe6a;
      --white:  #FFFFFF;
      --muted:  #6B7280;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    body {
      font-family: var(--font);
      font-size: 17px;
      line-height: 1.65;
      color: var(--navy);
      background: var(--cream);
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }
    img, svg { display: block; max-width: 100%; }

    /* ── NAV ── */
    .site-nav {
      background: var(--navy);
      padding: 18px 0;
      border-bottom: 1px solid rgba(201,168,76,0.15);
    }
    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--white);
      font-weight: 900;
      font-size: 1.1rem;
      letter-spacing: -0.01em;
      text-decoration: none;
    }
    .logo-mark {
      width: 36px;
      height: 36px;
      background: var(--gold);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: 900;
      color: var(--navy);
      flex-shrink: 0;
    }
    .nav-link {
      color: var(--gold);
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .nav-link:hover { text-decoration: underline; }

    /* ── HERO ── */
    .hero {
      background: var(--navy);
      color: var(--white);
      padding: 90px 24px 100px;
      text-align: center;
      flex: 1;
    }
    .hero-inner {
      max-width: 600px;
      margin: 0 auto;
    }

    .tick-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(201,168,76,0.15);
      border: 2px solid rgba(201,168,76,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 36px;
    }
    .tick-icon svg {
      width: 36px;
      height: 36px;
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      color: var(--white);
      margin-bottom: 20px;
    }

    .hero-sub {
      font-size: 1.1rem;
      color: var(--cream);
      opacity: 0.85;
      margin-bottom: 44px;
      line-height: 1.65;
    }

    .btn-gold {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--gold);
      color: var(--navy);
      font-weight: 800;
      font-size: 1rem;
      padding: 15px 36px;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .btn-gold:hover {
      background: var(--gold-h);
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(201,168,76,0.35);
    }

    /* ── FOOTER ── */
    .site-footer {
      background: var(--navy);
      color: rgba(255,255,255,0.7);
      padding: 44px 24px 28px;
    }
    .footer-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 24px;
      margin-bottom: 28px;
    }
    @media (max-width: 640px) {
      .footer-inner { grid-template-columns: 1fr; text-align: center; }
      .footer-right { justify-content: center; }
    }
    .footer-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--white);
      font-weight: 900;
      font-size: 1rem;
    }
    .footer-logo .logo-mark { width: 32px; height: 32px; font-size: 0.95rem; }
    .footer-centre {
      text-align: center;
      font-size: 0.88rem;
      color: rgba(255,255,255,0.65);
      white-space: nowrap;
    }
    .footer-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 20px;
      font-size: 0.88rem;
    }
    .footer-right a {
      color: var(--gold);
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .footer-right a:hover { opacity: 0.75; }
    .footer-copy {
      max-width: 1100px;
      margin: 0 auto;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 20px;
      text-align: center;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.35);
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="site-nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <div class="logo-mark">M</div>
        MAGION.AI
      </a>
      <a href="https://magion.ai" target="_blank" rel="noopener" class="nav-link">magion.ai</a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-inner">
      <div class="tick-icon">
        <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M7 18L14.5 25.5L29 10.5" stroke="#C9A84C" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1>You're registered.</h1>
      <p class="hero-sub">
        We'll send your Google Meet link before the session.<br>
        See you on 11 May at 3pm UK.
      </p>
      <a href="index.html" class="btn-gold">Back to event page</a>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-logo">
        <div class="logo-mark">M</div>
        MAGION.AI
      </div>
      <div class="footer-centre">
        Hosted by Will Richardson, CEO &nbsp;·&nbsp; Magion AI
      </div>
      <div class="footer-right">
        <a href="https://linkedin.com/in/willrichardson" target="_blank" rel="noopener">linkedin.com/in/willrichardson</a>
        <a href="https://magion.ai" target="_blank" rel="noopener">magion.ai</a>
      </div>
    </div>
    <div class="footer-copy">&copy; 2026 Magion AI. All rights reserved.</div>
  </footer>

</body>
</html>
